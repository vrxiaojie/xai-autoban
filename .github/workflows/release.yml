name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Test and build Linux plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Test and build Linux plugins
        env:
          GO_BUILD_IMAGE: golang:1.24-bookworm
        run: |
          set -euo pipefail
          mkdir -p dist

          docker run --rm \
            --platform linux/amd64 \
            -v "$PWD:/src" \
            -w /src \
            "$GO_BUILD_IMAGE" \
            go test ./...

          for arch in amd64 arm64; do
            output="dist/xai-autoban-linux-${arch}.so"
            docker run --rm \
              --platform "linux/${arch}" \
              -v "$PWD:/src" \
              -w /src \
              -e OUTPUT="$output" \
              "$GO_BUILD_IMAGE" \
              sh -ceu 'CGO_ENABLED=1 go build -buildvcs=false -buildmode=c-shared -trimpath -ldflags="-s -w" -o "$OUTPUT" .'
            echo "Built $output"
          done

      - name: Upload Linux plugins
        uses: actions/upload-artifact@v4
        with:
          name: linux-plugins
          path: |
            dist/xai-autoban-linux-amd64.so
            dist/xai-autoban-linux-arm64.so
          if-no-files-found: error

  build-macos-arm64:
    name: Test and build macOS arm64 plugin
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Test on macOS
        run: go test ./...

      - name: Compile tests for macOS arm64
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
          CC: "clang -arch arm64"
        run: |
          set -euo pipefail
          go test -c -o /tmp/xai-autoban-darwin-arm64.test .
          lipo /tmp/xai-autoban-darwin-arm64.test -verify_arch arm64

      - name: Build macOS arm64 plugin
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
          CC: "clang -arch arm64"
        run: |
          set -euo pipefail
          mkdir -p dist
          output="dist/xai-autoban-darwin-arm64.so"
          go build \
            -buildvcs=false \
            -buildmode=c-shared \
            -trimpath \
            -ldflags="-s -w" \
            -o "$output" \
            .

          file "$output"
          lipo "$output" -verify_arch arm64
          nm -gU "$output" > /tmp/xai-autoban-darwin-arm64-symbols.txt
          for symbol in cliproxy_plugin_init cliproxyPluginCall cliproxyPluginFree cliproxyPluginShutdown; do
            grep -q "_${symbol}$" /tmp/xai-autoban-darwin-arm64-symbols.txt
          done
          echo "Built $output"

      - name: Upload macOS arm64 plugin
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-plugin
          path: dist/xai-autoban-darwin-arm64.so
          if-no-files-found: error

  publish-release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-linux
      - build-macos-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Download plugins
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum \
            xai-autoban-linux-amd64.so \
            xai-autoban-linux-arm64.so \
            xai-autoban-darwin-arm64.so \
            > SHA256SUMS
          ls -lh
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/xai-autoban-linux-amd64.so
            dist/xai-autoban-linux-arm64.so
            dist/xai-autoban-darwin-arm64.so
            dist/SHA256SUMS
