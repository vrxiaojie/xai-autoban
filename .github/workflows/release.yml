name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test and build plugins
        env:
          GO_BUILD_IMAGE: golang:1.24-bookworm
        run: |
          set -euo pipefail
          mkdir -p dist

          docker run --rm \
            --platform linux/amd64 \
            -v "$PWD:/src" \
            -w /src \
            "$GO_BUILD_IMAGE" \
            go test ./...

          for arch in amd64 arm64; do
            output="dist/xai-autoban-linux-${arch}.so"
            docker run --rm \
              --platform "linux/${arch}" \
              -v "$PWD:/src" \
              -w /src \
              -e OUTPUT="$output" \
              "$GO_BUILD_IMAGE" \
              sh -ceu 'CGO_ENABLED=1 go build -buildvcs=false -buildmode=c-shared -trimpath -ldflags="-s -w" -o "$OUTPUT" .'
            echo "Built $output"
          done

          (
            cd dist
            sha256sum xai-autoban-linux-amd64.so xai-autoban-linux-arm64.so > SHA256SUMS
          )
          ls -lh dist
          cat dist/SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/xai-autoban-linux-amd64.so
            dist/xai-autoban-linux-arm64.so
            dist/SHA256SUMS
